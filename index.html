<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Poker Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background-color: #1c1c1c; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none; }
        .lobby-title { font-size: 1.8em; margin-bottom: 30px; font-weight: bold; }
        .room-card { background: #2b2b2b; padding: 20px; margin: 15px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .enter-btn { background: #3390ec; color: #ffffff; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .table-container { display: flex; justify-content: center; margin-top: 60px; }
        .felt { width: 320px; height: 200px; background: #1a5e20; border: 10px solid #4a2c10; border-radius: 50% / 100%; position: relative; }
        .player { position: absolute; font-size: 0.8em; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 6px; white-space: nowrap; border: 1px solid #555; }
        .top { top: -40px; left: 50%; transform: translateX(-50%); }
        .bottom { bottom: -40px; left: 50%; transform: translateX(-50%); }
        .left { left: -50px; top: 45%; }
        .right { right: -50px; top: 45%; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-title">🎲 Poker Arena</div>
        <div class="room-card">
            <span>Low Stakes (100)</span>
            <button class="enter-btn" onclick="joinRoom('low')">Oyna</button>
        </div>
        <div class="room-card">
            <span>High Stakes (500)</span>
            <button class="enter-btn" onclick="joinRoom('high')">Oyna</button>
        </div>
    </div>

    <div id="game-table" class="hidden">
        <div class="table-container">
            <div class="felt">
                <div class="player top">Boş</div>
                <div class="player left">Boş</div>
                <div class="player right">Boş</div>
                <div class="player bottom">Siz</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://bearbee-poker.onrender.com", { transports: ['websocket'] });
        const tg = window.Telegram.WebApp;
        tg.expand();

        function joinRoom(id) {
            const name = tg.initDataUnsafe.user?.first_name || "Qonaq";
            socket.emit('joinTable', { tableId: id, playerName: name });
        }

        socket.on('tableUpdated', (players) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-table').classList.remove('hidden');
            
            const positions = ['.bottom', '.right', '.top', '.left'];
            positions.forEach(pos => document.querySelector(pos).innerText = "Boş");
            
            players.forEach((p, i) => { 
                if(positions[i]) document.querySelector(positions[i]).innerText = p.name; 
            });
        });
    </script>
</body>
</html>
