<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Arena</title>
    <style>
        body { background: #1c1c1c; color: white; text-align: center; font-family: sans-serif; }
        .enter-btn { padding: 20px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>🎲 Poker Arena</h1>
        <button class="enter-btn" onclick="joinRoom('low')">Oyna (Low Stakes)</button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const socket = io("https://bearbee-poker.onrender.com", { transports: ['websocket'] });
        const tg = window.Telegram.WebApp;
        tg.expand();

        function joinRoom(id) {
            const name = tg.initDataUnsafe?.user?.first_name || "Qonaq";
            socket.emit('joinTable', { tableId: id, playerName: name });
            alert("Qoşulma sorğusu göndərildi!");
        }
    </script>
</body>
</html>
