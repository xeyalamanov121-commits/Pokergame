<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Arena</title>
    <style>
        body { background: #1c1c1c; color: white; text-align: center; font-family: sans-serif; }
        #game-table { display: none; }
        .enter-btn { padding: 15px 30px; background: #3390ec; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>🎲 Poker Arena</h1>
        <button class="enter-btn" onclick="joinRoom('low')">Oyna (Low Stakes)</button>
    </div>

    <div id="game-table">
        <h2>Oyun masası</h2>
        <div id="players-list">Gözləyirsiniz...</div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const socket = io("https://bearbee-poker.onrender.com", { transports: ['websocket'] });
        
        function joinRoom(id) {
            const name = window.Telegram.WebApp.initDataUnsafe?.user?.first_name || "Qonaq";
            socket.emit('joinTable', { tableId: id, playerName: name });
        }

        socket.on('tableUpdated', (players) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-table').style.display = 'block';
            document.getElementById('players-list').innerText = "Masadakılar: " + players.map(p => p.name).join(', ');
        });
    </script>
</body>
</html>
