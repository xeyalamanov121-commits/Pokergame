<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Poker Arena</title>
    <style>
        /* Sənin faylında olan bütün CSS kodları bura gəlir */
        body { background: #0a0a0a; color: #e8e0cc; font-family: 'DM Mono', monospace; }
        .felt { background: #1a4a2e; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <button onclick="joinGame('low')">Oyna</button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        function joinGame(tableId) {
            socket.emit('joinTable', { tableId, playerName: "Oyunçu" });
        }

        socket.on('tableUpdated', (table) => {
            console.log("Masa yeniləndi:", table);
            // Burada interfeysi yeniləyən kodlar yazılmalıdır
        });
    </script>
</body>
</html>
