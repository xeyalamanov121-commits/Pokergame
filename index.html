<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div id="lobby">
        <button onclick="joinRoom('low')" style="padding: 20px; font-size: 20px;">Oyna (Low)</button>
    </div>
    <div id="game-table" style="display:none;">
        <h1>Oyun masası</h1>
    </div>

    <script>
        // Bağlantı konfiqurasiyası
        const socket = io("https://bearbee-poker.onrender.com", { 
            transports: ['websocket'],
            upgrade: false
        });

        const tg = window.Telegram.WebApp;
        tg.expand();

        function joinRoom(id) {
            // Adı Telegram-dan alırıq, almasaq "Qonaq" qoyuruq
            const name = tg.initDataUnsafe?.user?.first_name || "Qonaq";
            
            // Serverə məlumat göndəririk
            socket.emit('joinTable', { tableId: id, playerName: name });
            
            // Vizual dəyişiklik
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-table').style.display = 'block';
        }
    </script>
</body>
</html>
