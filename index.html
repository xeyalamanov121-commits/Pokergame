<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Poker Arena</title>
    <style>
        body { background: #1c1c1c; color: white; text-align: center; font-family: sans-serif; }
        #game-table { display: none; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>🎲 Poker Arena</h1>
        <button onclick="joinRoom('low')">Oyna (Low Stakes)</button>
    </div>
    <div id="game-table">
        <h2>Oyun masası</h2>
        <div id="players"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io(); // Artıq link yazmağa ehtiyac yoxdur, server avtomatik tapacaq
        
        function joinRoom(id) {
            socket.emit('joinTable', { tableId: id, playerName: "Oyunçu" });
        }

        socket.on('tableUpdated', (players) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-table').style.display = 'block';
            document.getElementById('players').innerText = "Oyunçular: " + players.length;
        });
    </script>
</body>
</html>
