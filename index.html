<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bearbee Cyber Empire</title>
    <script src="https://sad.adsgram.ai/js/adsgram-api.js"></script>
    <script>
        const adsInstance = window.Adsgram.init({ blockId: "3742" });
        
        async function playAd(type) {
            try {
                const res = await adsInstance.show();
                if (res.done) {
                    let reward = (type === "high") ? 5000 : 500;
                    // Balansı yenilə və sinxronizasiya et
                    window.userStats.honey += reward;
                    await syncToBackend();
                    alert('🎁 ' + reward + ' Data balansınıza əlavə edildi!');
                }
            } catch (e) { alert("Reklam hazırda əlçatan deyil."); }
        }

        async function syncToBackend() {
            try {
                await fetch("https://bearbee-server.vercel.app/api/user/sync", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(window.userStats)
                });
            } catch (e) { console.error("Sync xətası:", e); }
        }
    </script>
</head>
<body>
    <button onclick="playAd('low')">📺 500 Data Qazan</button>
    <button onclick="playAd('high')">📺 5000 Data Qazan</button>
</body>
</html>
