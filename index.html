<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Poker Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background-color: #1c1c1c; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none; }
        .lobby-title { font-size: 1.5em; margin-bottom: 20px; }
        .room-card { background: #2b2b2b; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .enter-btn { background: #3390ec; color: #ffffff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .table-container { display: flex; justify-content: center; margin-top: 50px; }
        .felt { width: 300px; height: 180px; background: #1a5e20; border: 8px solid #4a2c10; border-radius: 50% / 100%; position: relative; }
        .player { position: absolute; font-size: 0.7em; background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 5px; }
        .top { top: -30px; left: 50%; transform: translateX(-50%); }
        .bottom { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .left { left: -40px; top: 40%; }
        .right { right: -40px; top: 40%; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-title">🎲 Poker Arena</div>
        <div class="room-card"><span>Low Stakes</span><button class="enter-btn" onclick="joinRoom('low')">Oyna</button></div>
        <div class="room-card"><span>High Stakes</span><button class="enter-btn" onclick="joinRoom('high')">Oyna</button></div>
    </div>

    <div id="game-table" class="hidden">
        <div class="table-container">
            <div class="felt">
                <div class="player top">...</div>
                <div class="player left">...</div>
                <div class="player right">...</div>
                <div class="player bottom">Siz</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://poker-arena-live.onrender.com"); // Buraya öz linkinizi yazın
        const tg = window.Telegram.WebApp;
        tg.expand();

        function joinRoom(id) {
            const name = tg.initDataUnsafe.user?.first_name || "Qonaq";
            socket.emit('joinTable', { tableId: id, playerName: name, buyIn: 100 });
        }

        socket.on('tableUpdated', (players) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-table').classList.remove('hidden');
            const positions = ['.bottom', '.right', '.top', '.left'];
            players.forEach((p, i) => { if(positions[i]) document.querySelector(positions[i]).innerText = p.name; });
        });
    </script>
</body>
</html>
