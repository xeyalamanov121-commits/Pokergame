<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Arena</title>
    <style>
        body { background: #1c1c1c; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .enter-btn { padding: 20px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; background: #3390ec; color: white; border: none; }
        #game-table { display: none; margin-top: 50px; }
        .felt { width: 300px; height: 180px; background: #1a5e20; border: 8px solid #4a2c10; border-radius: 50% / 100%; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>🎲 Poker Arena</h1>
        <button class="enter-btn" onclick="joinRoom('low')">Oyna (Low Stakes)</button>
    </div>

    <div id="game-table">
        <h1>Oyun masası</h1>
        <div class="felt">Siz masadasınız!</div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const socket = io("https://bearbee-poker.onrender.com", { transports: ['websocket'] });
        const tg = window.Telegram.WebApp;
        tg.expand();

        function joinRoom(id) {
            const name = tg.initDataUnsafe?.user?.first_name || "Qonaq";
            socket.emit('joinTable', { tableId: id, playerName: name });
        }

        // SERVERDƏN CAVAB GƏLƏNDƏ İŞƏ DÜŞÜR
        socket.on('tableUpdated', (players) => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-table').style.display = 'block';
        });
    </script>
</body>
</html>
