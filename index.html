<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Poker Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1c);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .lobby-title { font-size: 1.5em; margin-bottom: 20px; }
        .room-card {
            background: var(--tg-theme-secondary-bg-color, #2b2b2b);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .enter-btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="lobby-title">🎲 Poker Arena</div>
    <div id="rooms">
        <div class="room-card">
            <span>Low Stakes (1000)</span>
            <button class="enter-btn" onclick="joinRoom('low')">Oyna</button>
        </div>
        <div class="room-card">
            <span>High Stakes (5000)</span>
            <button class="enter-btn" onclick="joinRoom('high')">Oyna</button>
        </div>
    </div>

    <script>
        // Telegram Mini App-i işə salırıq
        const tg = window.Telegram.WebApp;
        tg.expand(); // Tam ekran

        function joinRoom(id) {
            // Telegram istifadəçisinin adını almaq
            const user = tg.initDataUnsafe.user?.first_name || "Qonaq";
            alert(user + ", " + id + " otağına qoşulursunuz!");
        }
    </script>
</body>
</html>
